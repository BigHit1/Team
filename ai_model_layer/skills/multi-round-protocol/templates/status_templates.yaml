## 6. PARTIAL 模板

### 基础版本
```yaml
---TASK_STATUS---
status: partial
reason: [完成了什么，存在什么问题]
confidence: 0.7
completed:
  - [已完成项1]
  - [已完成项2]
warnings:
  - [警告1]
  - [警告2]
can_proceed: true
---END_STATUS---
```

### 完整版本
```yaml
---TASK_STATUS---
status: partial
reason: [详细说明]
confidence: 0.7
completed:
  - [已完成项1]
  - [已完成项2]
warnings:
  - [警告1]
  - [警告2]
missing_features:
  - [缺少的功能1]
  - [缺少的功能2]
can_proceed: true
recommended_action: [建议的后续操作]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: partial
reason: 核心生命恢复功能已实现，但缺少错误处理和边界检查
confidence: 0.75
completed:
  - 实现了基础的生命恢复逻辑
  - 添加了可配置的恢复速率
  - 创建了必要的属性和方法
warnings:
  - 缺少空指针检查
  - 未处理恢复速率为负数的情况
  - 未处理生命值超过最大值的情况
missing_features:
  - 单元测试
  - 详细的代码注释
can_proceed: true
recommended_action: 建议添加错误处理和边界检查后再部署到生产环境
---END_STATUS---
```

