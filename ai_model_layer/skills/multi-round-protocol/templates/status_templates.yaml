# 状态模板集合

可直接复制使用的状态块模板。

---

## 1. COMPLETED 模板

### 基础版本
```yaml
---TASK_STATUS---
status: completed
reason: [简要说明完成了什么]
confidence: 0.9
---END_STATUS---
```

### 完整版本
```yaml
---TASK_STATUS---
status: completed
reason: [详细说明完成的工作]
confidence: 0.9
files_modified:
  - [文件路径1]
  - [文件路径2]
changes_summary: |
  - [变更1]
  - [变更2]
  - [变更3]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: completed
reason: 成功实现生命恢复系统
confidence: 0.95
files_modified:
  - Source/Characters/MyCharacter.h
  - Source/Characters/MyCharacter.cpp
changes_summary: |
  - 添加 HealthRegenRate 属性
  - 实现 RegenerateHealth 方法
  - 在 Tick 中调用恢复逻辑
---END_STATUS---
```

---

## 2. CONTINUE 模板

### 基础版本
```yaml
---TASK_STATUS---
status: continue
reason: [为什么需要继续]
progress: 0.5
next_part: [下一步做什么]
---END_STATUS---
```

### 完整版本
```yaml
---TASK_STATUS---
status: continue
reason: [详细说明当前进度]
progress: 0.5
completed_parts:
  - [已完成项1]
  - [已完成项2]
next_part: [下一步的详细计划]
estimated_rounds: [预计还需几轮]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: continue
reason: 完成了头文件定义，需要继续实现源文件
progress: 0.4
completed_parts:
  - 创建 HealthRegenComponent.h
  - 定义类结构和属性
  - 添加必要的头文件引用
next_part: 实现 HealthRegenComponent.cpp 中的所有方法
estimated_rounds: 2
---END_STATUS---
```

---

## 3. NEED_HUMAN 模板

### 决策类型
```yaml
---TASK_STATUS---
status: need_human
reason: [需要决策的原因]
intervention_type: decision
priority: high
question: |
  [具体的问题描述]
  
  选项：
  1. [选项1描述]
  2. [选项2描述]
options:
  - option1: [选项1]
  - option2: [选项2]
---END_STATUS---
```

### 许可类型
```yaml
---TASK_STATUS---
status: need_human
reason: [需要许可的原因]
intervention_type: permission
priority: high
question: |
  需要执行以下操作，是否允许？
  - [操作1]
  - [操作2]
risk_level: medium
---END_STATUS---
```

### 澄清类型
```yaml
---TASK_STATUS---
status: need_human
reason: [需要澄清的原因]
intervention_type: clarification
priority: medium
question: |
  [需要澄清的具体问题]
unclear_points:
  - [不明确点1]
  - [不明确点2]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: need_human
reason: 发现项目中已有类似组件，需要确认实现方案
intervention_type: decision
priority: high
question: |
  发现项目中已有 HealthComponent，有两个实现方案：
  
  方案1: 扩展现有 HealthComponent 添加恢复功能
    优点：代码集中，易于维护
    缺点：需要修改现有代码
  
  方案2: 创建新的 HealthRegenComponent
    优点：不影响现有代码
    缺点：需要管理两个组件
  
  请问选择哪个方案？
options:
  - extend_existing: 扩展现有组件（推荐）
  - create_new: 创建新组件
---END_STATUS---
```

