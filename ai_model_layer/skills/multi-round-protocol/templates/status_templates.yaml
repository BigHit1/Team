## 📋 使用指南

### 如何选择模板

1. **任务完成且无问题** → COMPLETED 模板
2. **任务太大需要分步** → CONTINUE 模板
3. **需要用户决策/许可** → NEED_HUMAN 模板
4. **遇到错误** → ERROR 模板
5. **等待外部操作** → WAITING 模板
6. **完成但有警告** → PARTIAL 模板

### 自定义模板

可以根据实际需求添加自定义字段：

```yaml
---TASK_STATUS---
status: completed
reason: 任务完成
confidence: 0.9
# 自定义字段
custom_field1: value1
custom_field2: value2
---END_STATUS---
```

### 组合使用

某些情况下可以组合多个状态信息：

```yaml
---TASK_STATUS---
status: partial
reason: 核心功能完成，但建议添加测试
confidence: 0.8
completed: [...]
warnings: [...]
# 同时说明下一步
next_steps:
  - 添加单元测试
  - 添加集成测试
---END_STATUS---
```

---

**提示**: 复制相应的模板，填入实际内容即可使用！

