## 4. ERROR 模板

### 编译错误
```yaml
---TASK_STATUS---
status: error
error_type: compile
error_message: |
  [完整的编译错误信息]
error_location:
  file: [文件路径]
  line: [行号]
root_cause: [根本原因分析]
suggested_fix: [修复建议]
can_auto_fix: true
---END_STATUS---
```

### 逻辑错误
```yaml
---TASK_STATUS---
status: error
error_type: logic
error_message: [错误描述]
root_cause: [根本原因]
suggested_fix: [修复方案]
impact: [影响范围]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: error
error_type: compile
error_message: |
  MyCharacter.cpp(45): error C2065: 'HealthRegenRate' : undeclared identifier
error_location:
  file: Source/Characters/MyCharacter.cpp
  line: 45
root_cause: 在 .cpp 文件中使用了 HealthRegenRate，但忘记在 .h 文件中声明
suggested_fix: 在 MyCharacter.h 中添加 UPROPERTY() float HealthRegenRate;
can_auto_fix: true
---END_STATUS---
```

