## 5. WAITING 模板

### 等待编译
```yaml
---TASK_STATUS---
status: waiting
waiting_for: compile_result
reason: 等待编译结果以验证代码正确性
timeout: 300
next_action: 根据编译结果决定是否需要修复
fallback_plan: 如果编译失败，分析错误并修复
---END_STATUS---
```

### 等待测试
```yaml
---TASK_STATUS---
status: waiting
waiting_for: test_result
reason: 等待单元测试结果
timeout: 180
next_action: 根据测试结果决定下一步
fallback_plan: 如果测试失败，分析并修复问题
---END_STATUS---
```

### 等待用户输入
```yaml
---TASK_STATUS---
status: waiting
waiting_for: user_input
reason: [等待用户提供什么信息]
timeout: 3600
required_info:
  - [需要的信息1]
  - [需要的信息2]
---END_STATUS---
```

### 示例
```yaml
---TASK_STATUS---
status: waiting
waiting_for: compile_result
reason: 等待 UE5 编译结果以验证生命恢复系统实现正确
timeout: 300
next_action: 如果编译成功，进行运行时测试；如果失败，分析错误并修复
fallback_plan: 如果超时，建议手动编译并提供错误信息
---END_STATUS---
```

