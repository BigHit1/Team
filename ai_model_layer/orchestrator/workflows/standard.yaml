# 标准工作流：Plan → Architect → Code → Review

name: standard
description: 标准开发工作流，包含规划、设计、实现、审查四个阶段

phases:
  - name: planning
    agent: planner
    description: 分析需求并创建详细的实现计划
    requirement: |
      你的任务：分析需求并创建详细的实现计划。
      **重要：你只负责规划，不负责实现代码！**
      需求内容：
      {original_requirement}
    max_iterations: 5
    timeout: 900  # 15分钟，支持5轮对话
    output_file: plan.md
  
  - name: architecture
    agent: architect
    description: 基于计划设计系统架构
    requirement: |
      你的任务：基于实现计划设计系统架构。
      **重要：你只负责设计架构，不负责实现代码！**
      工作流程：
      第一步（必须）：使用Read工具读取文档 {previous_output_file}
      第二步：理解实现计划的内容
      第三步：在回复中输出完整的架构设计文档（不是创建文件！）
      不要跳过第一步！必须先读取文档才能开始设计。
    depends_on: planning
    max_iterations: 5
    timeout: 900  # 15分钟
    output_file: architecture.md
  
  - name: implementation
    agent: coder
    description: 基于架构实现代码
    requirement: |
      你的任务：基于架构设计实现代码。
      第一步（必须）：使用Read工具读取文档 {previous_output_file}
      第二步：理解架构设计的内容
      第三步：根据架构设计实现代码
      不要跳过第一步！必须先读取文档才能开始编码。
    depends_on: architecture
    max_iterations: 10
    timeout: 1800  # 30分钟，支持10轮对话
    output_file: implementation.md
  
  - name: review
    agent: code-reviewer
    description: 审查代码质量
    requirement: |
      你的任务：审查刚才实现的代码质量。
      第一步（必须）：使用Read工具读取文档 {previous_output_file}
      第二步：理解实现的代码内容
      第三步：审查代码质量，提出改进建议
      不要跳过第一步！必须先读取文档才能开始审查。
    depends_on: implementation
    max_iterations: 3
    timeout: 600  # 10分钟
    output_file: review.md

