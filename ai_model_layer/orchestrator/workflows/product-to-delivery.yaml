# 产品到交付完整工作流
# Product → UI Design → Plan → Architect → Code → Review → Clean → Document

name: product-to-delivery
description: 从产品需求到最终交付的完整工作流，包含产品分析、UI设计、规划、架构、实现、审查、清理、文档八个阶段

phases:
  - name: product_analysis
    agent: product-manager
    description: 产品经理分析需求，输出产品方案
    requirement: |
      你的任务：分析产品需求并输出产品方案。
      
      需求内容：
      {original_requirement}
      注意请先阅读项目的ReadMe了解这个项目。
      
      请输出：
      1. 产品定位和目标用户
      2. 核心功能和优先级
      3. 用户体验流程
      4. 商业化策略（如适用）
      5. 关键指标和成功标准
    max_iterations: 5
    timeout: 900
  
  - name: ui_design_review
    agent: ui-designer
    description: UI设计师审查产品方案并提供UI/UX建议
    requirement: |
      你的任务：基于产品方案，提供UI/UX设计建议。
      
      产品方案：
      {previous_phase_output}
      
      请提供：
      - 界面布局和导航结构
      - 视觉设计建议（颜色、字体、图标）
      - 交互设计和用户流程
      - 可访问性建议
      - 符合平台规范的设计要点
    depends_on: product_analysis
    max_iterations: 5
    timeout: 900
  
  - name: planning
    agent: planner
    description: 规划专家基于产品和UI方案创建实现计划
    requirement: |
      你的任务：基于产品方案和UI设计，创建详细的实现计划。
      
      产品方案：
      {phase_outputs.product_analysis}
      
      UI设计：
      {previous_phase_output}
      
      请创建详细的实现计划，包括：
      - 需求分解和优先级
      - 实现阶段和步骤
      - 技术风险评估
      - 依赖关系分析
    depends_on: ui_design_review
    max_iterations: 5
    timeout: 900
  
  - name: architecture
    agent: architect
    description: 架构专家基于计划设计系统架构
    requirement: |
      你的任务：基于实现计划设计系统架构。
      
      实现计划：
      {previous_phase_output}
      
      请设计系统架构，包括：
      - 高层架构图
      - 组件职责和接口
      - 数据模型设计
      - 技术选型和权衡
    depends_on: planning
    max_iterations: 5
    timeout: 900
  
  - name: implementation
    agent: coder
    description: 开发专家基于架构实现代码
    requirement: |
      你的任务：基于架构设计实现代码。
      
      架构设计：
      {previous_phase_output}
      
      UI设计参考：
      {phase_outputs.ui_design_review}
      
      请实现代码，确保：
      - 遵循架构设计
      - 符合UI设计规范
      - 代码质量高、可维护
    depends_on: architecture
    max_iterations: 10
    timeout: 1800
  
  - name: code_review
    agent: code-reviewer
    description: 代码审查专家审查代码质量
    requirement: |
      你的任务：审查刚才实现的代码质量。
      
      实现内容：
      {previous_phase_output}
      
      请审查代码质量，重点检查：
      - 代码质量和最佳实践
      - 性能问题
      - 潜在的bug
      - 可维护性
    depends_on: implementation
    max_iterations: 3
    timeout: 600
  
  - name: cleanup
    agent: cleaner
    description: 清理专家优化和清理代码
    requirement: |
      你的任务：清理和优化刚才实现的代码。
      
      实现内容：
      {phase_outputs.implementation}
      
      审查报告：
      {previous_phase_output}
      
      请清理代码，包括：
      - 移除未使用的代码
      - 优化代码结构
      - 统一代码风格
      - 修复审查中发现的问题
    depends_on: code_review
    max_iterations: 3
    timeout: 600
  
  - name: documentation
    agent: doc-updater
    description: 文档专家编写完整文档
    requirement: |
      你的任务：为实现的功能编写完整的文档。
      
      产品方案：
      {phase_outputs.product_analysis}
      
      UI设计：
      {phase_outputs.ui_design_review}
      
      架构设计：
      {phase_outputs.architecture}
      
      实现内容：
      {phase_outputs.implementation}
      
      请编写文档，包括：
      - 功能说明和使用指南
      - API文档
      - 代码注释
      - 架构文档
      - 变更日志
    depends_on: cleanup
    max_iterations: 3
    timeout: 600
