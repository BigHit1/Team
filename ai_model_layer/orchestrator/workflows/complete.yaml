# 完整工作流：包含所有 7 个 Agent
# Plan → Architect → Code → Review → Security → Clean → Document

name: complete
description: 完整的开发工作流，包含规划、设计、实现、审查、安全、清理、文档七个阶段

phases:
  - name: planning
    agent: planner
    description: 分析需求并创建详细的实现计划
    requirement: "{original_requirement}"
    max_iterations: 5
    timeout: 900  # 15分钟
    output_file: plan.md
  
  - name: architecture
    agent: architect
    description: 基于计划设计系统架构
    requirement: "基于实现计划，设计系统架构。\n\n实现计划文档路径：{previous_output_file}\n\n请先阅读该文档，然后设计系统架构。"
    depends_on: planning
    max_iterations: 5
    timeout: 900  # 15分钟
    output_file: architecture.md
  
  - name: implementation
    agent: ue5-code-guide
    description: 基于架构实现代码
    requirement: "基于架构设计，实现代码。\n\n架构设计文档路径：{previous_output_file}\n\n请先阅读该文档，然后实现代码。"
    depends_on: architecture
    max_iterations: 10
    timeout: 1800  # 30分钟
    output_file: implementation.md
  
  - name: code_review
    agent: code-reviewer
    description: 审查代码质量
    requirement: "审查刚才实现的代码"
    depends_on: implementation
    max_iterations: 3
    timeout: 600  # 10分钟
    output_file: code_review.md
  
  - name: security_review
    agent: security-reviewer
    description: 深度安全审查
    requirement: "对刚才实现的代码进行深度安全审查"
    depends_on: implementation
    max_iterations: 5
    timeout: 900  # 15分钟
    output_file: security_review.md
  
  - name: cleanup
    agent: cleaner
    description: 清理代码，移除无用代码
    requirement: "清理刚才实现的代码"
    depends_on: code_review
    max_iterations: 3
    timeout: 600  # 10分钟
    output_file: cleanup.md
  
  - name: documentation
    agent: doc-updater
    description: 更新文档和注释
    requirement: "为实现的代码编写完整的文档"
    depends_on: cleanup
    max_iterations: 3
    timeout: 600  # 10分钟
    output_file: documentation.md

