# 快速工作流：Code → Review
# 适合简单任务，跳过规划和架构阶段

name: quick
description: 快速开发工作流，直接实现和审查

phases:
  - name: implementation
    agent: ue5-code-guide
    description: 直接实现代码
    requirement: "{original_requirement}"
    max_iterations: 8
    timeout: 1200  # 20分钟，支持8轮对话
    output_file: implementation.md
  
  - name: review
    agent: code-reviewer
    description: 快速审查代码
    requirement: "快速审查刚才实现的代码"
    depends_on: implementation
    max_iterations: 2
    timeout: 360  # 6分钟
    output_file: review.md

