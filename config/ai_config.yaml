
# AI Client Configuration
ai_client:
  # Claude Code CLI Configuration (推荐用于复杂任务)
  claude_code:
    # API 配置（支持自定义服务地址）
    api_key: "sk-9Z3DuTIUv46wnWBkUWKTqE9R7tNZusJ471Cq1V54OCkQHtaq"  # 或 CLAUDE_API_KEY
    api_base_url: "https://www.fucheers.top"  # 自定义 API 地址（可选）
    
    # CLI 配置
    cli_path: "claude"  # Claude Code CLI 命令路径
    model: "claude-opus-4"
    max_tokens: 8192
    temperature: 0.7
    timeout: 600
    
    # 迭代配置
    max_iterations: 5  # 自动迭代最大次数
    check_interval: 5  # 任务状态检查间隔（秒）
    auto_approve: true  # 自动批准所有更改
    
    # 索引目录（可选，用于让AI理解项目上下文）
    index_directories: []
  
  # MiniMax Configuration (via Anthropic-compatible API)
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    api_url: "https://api.minimaxi.com/anthropic"
    model: "MiniMax-M2.5"  # or MiniMax-M2.1
    max_tokens: 8192
    temperature: 0.7
    timeout: 300
    context_window: 200000
  

# Prompt Configuration
prompts:
  system_prompt: |
    You are a professional software developer.
    Your task is to generate high-quality, maintainable code based on requirements.
    
    Requirements:
    1. Code must follow best practices and coding standards
    2. Consider performance and security
    3. Add detailed comments
    4. Handle edge cases and errors
    5. Write testable and maintainable code
  
  coding_context: |
    Project Info:
    - Project Type: {project_type}
    - Programming Language: {language}
    
    Generate code based on the following requirements.

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/ai4ue_pipeline.log"
  console_output: true
  color: true
